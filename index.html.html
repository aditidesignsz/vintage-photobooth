<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vintage Photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Cadarville+Cursive&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --beige: #ede8e0;
  --brown: #6b5344;
  --brown-btn: #7a6055;
  --text-dark: #4a3828;
  --strip-pink: #f5c8c8;
  --strip-blue: #b8c8d8;
  --strip-olive: #b8c0a0;
  --strip-cream: #f5f0e0;
  --strip-lightblue: #c8d8e8;
}

body { font-family:'DM Sans',sans-serif; background:var(--beige); min-height:100vh; overflow:hidden; }

.screen { display:none; width:100vw; height:100vh; }
.screen.active { display:flex; }

/* ===== SCREEN 1: LANDING ===== */
#s1 {
  background:var(--beige);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px;
  gap:20px;
}

.hero-strips {
  position:relative;
  width:150px;
  height:180px;
}

.h-strip {
  position:absolute;
  width:86px;
  border-radius:4px;
  padding:6px 6px 14px;
  box-shadow:0 6px 24px rgba(0,0,0,0.13);
}
.h-strip.a { background:#f5c8c8; left:4px; top:12px; transform:rotate(-8deg); z-index:1; }
.h-strip.b { background:#f5c8c8; right:4px; top:0; transform:rotate(6deg); z-index:2; }

.h-photo {
  width:100%;
  aspect-ratio:3/4;
  background:linear-gradient(135deg,#bbb,#888);
  margin-bottom:3px;
  border-radius:2px;
  overflow:hidden;
}
.h-photo img { width:100%;height:100%;object-fit:cover; }

.h-date {
  font-family:'Cadarville Cursive',cursive;
  font-size:8px;
  color:var(--brown);
  text-align:center;
}

.landing-title {
  font-family:'Cadarville Cursive',cursive;
  font-size:46px;
  color:var(--brown);
}

.landing-btns { display:flex; gap:14px; }

.btn {
  background:var(--brown-btn);
  color:white;
  border:none;
  border-radius:8px;
  padding:13px 24px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  transition:background 0.2s, transform 0.15s;
}
.btn:hover { background:var(--brown); transform:translateY(-1px); }
.btn:active { transform:translateY(0); }
.btn:disabled { opacity:0.4; pointer-events:none; }

/* ===== SCREEN 2: CAMERA ===== */
#s2 {
  background:#000;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px;
  position:relative;
}

.back { position:absolute; top:20px; left:20px; background:none; border:none; color:white; font-size:22px; cursor:pointer; padding:8px; border-radius:50%; transition:background 0.2s; }
.back:hover { background:rgba(255,255,255,0.1); }
.back.dark { color:var(--brown); }

.cam-box {
  position:relative;
  width:min(460px,88vw);
  aspect-ratio:3/4;
  background:#111;
  border-radius:4px;
  overflow:hidden;
}

#vid {
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transform:scaleX(-1);
}

.cam-msg {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.55);
  color:white;
  font-size:17px;
  padding:11px 22px;
  border-radius:8px;
  backdrop-filter:blur(4px);
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.25s;
  pointer-events:none;
}
.cam-msg.on { opacity:1; }

.cam-num {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:110px;
  font-weight:300;
  text-shadow:0 2px 20px rgba(0,0,0,0.5);
  opacity:0;
  transition:opacity 0.15s;
  pointer-events:none;
  line-height:1;
}
.cam-num.on { opacity:1; }

.cam-flash {
  position:absolute;inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.08s;
}

.dots {
  display:flex; gap:10px;
  justify-content:center;
  position:absolute;
  bottom:14px; left:50%;
  transform:translateX(-50%);
}
.dot {
  width:10px; height:10px;
  border-radius:50%;
  background:rgba(255,255,255,0.28);
  transition:all 0.3s;
}
.dot.done { background:#4caf50; }
.dot.now  { background:#ff9800; transform:scale(1.3); }

/* perm fallback */
#permFallback {
  display:none;
  flex-direction:column;
  align-items:center;
  gap:18px;
  color:white;
  text-align:center;
  padding:40px;
}
#permFallback h2 { font-family:'Cadarville Cursive',cursive; font-size:30px; }
#permFallback p  { font-size:13px; color:#aaa; max-width:280px; line-height:1.6; }

/* ===== SCREEN 3: UPLOAD ===== */
#s3 {
  background:var(--beige);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px;
  gap:22px;
  position:relative;
}

.upload-title { font-family:'Cadarville Cursive',cursive; font-size:38px; color:var(--brown); }

.u-slots { display:flex; gap:14px; }

.u-slot {
  width:118px;
  aspect-ratio:3/4;
  background:white;
  border:2px dashed #c8b8a8;
  border-radius:8px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:6px; cursor:pointer;
  transition:all 0.2s; overflow:hidden;
  position:relative;
}
.u-slot:hover { border-color:var(--brown); }
.u-slot.has { border-style:solid; }
.u-slot img { position:absolute;inset:0;width:100%;height:100%;object-fit:cover; }
.u-slot .n { font-family:'Cadarville Cursive',cursive; font-size:30px; color:#c8b8a8; }
.u-slot .l { font-size:9px; color:#c8b8a8; letter-spacing:0.05em; text-transform:uppercase; }
.u-slot .x {
  position:absolute;top:4px;right:4px;
  background:rgba(0,0,0,0.5);color:white;
  border:none;border-radius:50%;
  width:20px;height:20px;font-size:9px;
  cursor:pointer;display:none;
  align-items:center;justify-content:center; z-index:3;
}
.u-slot.has:hover .x { display:flex; }

.u-prog { font-family:'Cadarville Cursive',cursive; font-size:20px; color:#a09080; }
#uFileIn { display:none; }

/* ===== SCREEN 4: RESULT ===== */
#s4 {
  background:var(--beige);
  flex-direction:row;
  align-items:center;
  justify-content:center;
  padding:40px;
  gap:72px;
  position:relative;
}

.r-left { display:flex;flex-direction:column;gap:16px; min-width:200px; max-width:240px; }
.r-left h2 { font-family:'Cadarville Cursive',cursive; font-size:38px; color:var(--brown); }
.r-left .bg-label { font-size:14px; color:var(--text-dark); margin-bottom:10px; }
.swatches { display:flex; gap:11px; }

.sw {
  width:44px;height:44px;
  border-radius:50%;
  cursor:pointer;
  border:3px solid transparent;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
  font-size:17px;color:var(--brown);
}
.sw .ck { opacity:0; transition:opacity 0.2s; }
.sw.on { border-color:var(--brown); }
.sw.on .ck { opacity:1; }

.r-right { display:flex;flex-direction:column;align-items:center;gap:12px; }
.printing { font-family:'Cadarville Cursive',cursive; font-size:28px; color:var(--brown); align-self:flex-start; }

.strip {
  width:140px;
  padding:8px 8px 16px;
  border-radius:4px;
  box-shadow:0 8px 32px rgba(0,0,0,0.14);
  transition:background 0.35s;
}

.s-photo {
  width:100%;
  aspect-ratio:3/4;
  overflow:hidden;
  margin-bottom:4px;
  border-radius:2px;
  background:#ddd;
}
.s-photo:last-of-type { margin-bottom:0; }
.s-photo img { width:100%;height:100%;object-fit:cover;display:block; }

.s-date {
  font-family:'Cadarville Cursive',cursive;
  font-size:13px;
  color:var(--brown);
  text-align:center;
  margin-top:9px;
}

.print-btn {
  background:var(--brown-btn);
  color:white;border:none;
  border-radius:8px;
  padding:11px 0;
  width:140px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  cursor:pointer;
  transition:background 0.2s,transform 0.15s;
}
.print-btn:hover { background:var(--brown);transform:translateY(-1px); }

#xCanvas { display:none; }
</style>
</head>

let uSlot = 0;
let stripColor = '#FBC3C1';

// date
const dateStr = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
document.getElementById('sdate').textContent = dateStr;

// ---- SCREEN NAV ----
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function backTo(id) { stopCam(); show(id); }

// ---- CAMERA ----
async function goCamera() {
  show('s2');
  document.getElementById('camMain').style.display = 'flex';
  document.getElementById('permFallback').style.display = 'none';
  resetDots();
  photos = [null,null,null];
  shotIdx = 0; busy = false;
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:960}},audio:false});
    document.getElementById('vid').srcObject = stream;
    await document.getElementById('vid').play();
    setTimeout(()=>runShots(), 800);
  } catch(e) {
    document.getElementById('camMain').style.display = 'none';
    document.getElementById('permFallback').style.display = 'flex';
  }
}

function stopCam() {
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
  const v=document.getElementById('vid'); v.srcObject=null;
}

const MSGS = ['','Get ready for second photo...','Get ready for third photo...'];

async function runShots() {
  if (busy) return; busy = true;
  for (let i=0; i<3; i++) {
    shotIdx = i;
    dotNow(i);
    if (i>0) { showMsg(MSGS[i]); await sleep(1600); hideMsg(); }
    await countdown(3);
    snap(i);
    dotDone(i);
    doFlash();
    if (i<2) await sleep(700);
  }
  busy = false;
  stopCam();
  goResult();
}

function countdown(n) {
  return new Promise(res=>{
    const el=document.getElementById('cnum');
    let c=n; el.textContent=c; el.classList.add('on');
    const iv=setInterval(()=>{
      c--;
      if(c<=0){ clearInterval(iv); el.classList.remove('on'); res(); }
      else el.textContent=c;
    },1000);
  });
}

function snap(slot) {
  const vid=document.getElementById('vid');
  const c=document.createElement('canvas');
  c.width=600; c.height=800;
  const ctx=c.getContext('2d');
  ctx.save(); ctx.translate(c.width,0); ctx.scale(-1,1);
  const vw=vid.videoWidth||640, vh=vid.videoHeight||480;
  const sc=Math.max(c.width/vw,c.height/vh);
  ctx.drawImage(vid,(c.width-vw*sc)/2,(c.height-vh*sc)/2,vw*sc,vh*sc);
  ctx.restore();
  applyVintage(ctx,c.width,c.height);
  photos[slot]=c.toDataURL('image/jpeg',0.95);
}

function applyBW(ctx,w,h) {
  // Step 1: desaturate to B&W with slight contrast
  const d=ctx.getImageData(0,0,w,h);
  for(let i=0;i<d.data.length;i+=4){
    const l=0.299*d.data[i]+0.587*d.data[i+1]+0.114*d.data[i+2];
    const v=Math.min(255,Math.max(0,l*1.08+5));
    d.data[i]=d.data[i+1]=d.data[i+2]=v;
  }
  ctx.putImageData(d,0,0);

  // Step 2: subtle warm sepia overlay
  ctx.globalAlpha=0.15;
  ctx.fillStyle='#c8b090';
  ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=1;

  // Step 3: grain using fillRect (NOT putImageData which overwrites everything)
  ctx.globalAlpha=0.07;
  for(let y=0;y<h;y+=2){
    for(let x=0;x<w;x+=2){
      const v=Math.floor(Math.random()*255);
      ctx.fillStyle=`rgb(${v},${v},${v})`;
      ctx.fillRect(x,y,1,1);
    }
  }
  ctx.globalAlpha=1;

  // Step 4: vignette
  const vg=ctx.createRadialGradient(w/2,h/2,h*0.28,w/2,h/2,h*0.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.50)');
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,w,h);
}

function applyVintage(ctx,w,h) {
  const d=ctx.getImageData(0,0,w,h);
  for(let i=0;i<d.data.length;i+=4){
    const r=d.data[i],g=d.data[i+1],b=d.data[i+2];
    // very subtle warm tone, barely there
    d.data[i]=Math.min(255,r*1.02+4);
    d.data[i+1]=Math.min(255,g*0.99+1);
    d.data[i+2]=Math.min(255,b*0.96-3);
  }
  ctx.putImageData(d,0,0);
  // minimal warm overlay
  ctx.globalAlpha=0.04; ctx.fillStyle='#c89060'; ctx.fillRect(0,0,w,h); ctx.globalAlpha=1;
  // very light grain
  ctx.globalAlpha=0.02;
  for(let y=0;y<h;y+=3) for(let x=0;x<w;x+=3){const v=Math.floor(Math.random()*255);ctx.fillStyle=`rgb(${v},${v},${v})`;ctx.fillRect(x,y,1,1);}
  ctx.globalAlpha=1;
  // soft vignette
  const g=ctx.createRadialGradient(w/2,h/2,h*0.38,w/2,h/2,h*0.78);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(20,10,0,0.18)');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
}

// ---- UPLOAD ----
function goUpload() {
  photos=[null,null,null];
  for(let i=0;i<3;i++) clearUSlot(i);
  updateUProg();
  show('s3');
}

function pickSlot(i) { uSlot=i; document.getElementById('uFileIn').click(); }

function onFile(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=600; c.height=800;
      const ctx=c.getContext('2d');
      const sc=Math.max(600/img.width,800/img.height);
      ctx.drawImage(img,(600-img.width*sc)/2,(800-img.height*sc)/2,img.width*sc,img.height*sc);
      applyBW(ctx,600,800);
      photos[uSlot]=c.toDataURL('image/jpeg',0.95);
      const slot=document.getElementById(`us${uSlot}`);
      slot.classList.add('has');
      slot.querySelector('.n').style.display='none';
      slot.querySelector('.l').style.display='none';
      let im=slot.querySelector('img');
      if(!im){im=document.createElement('img');slot.appendChild(im);}
      im.src=photos[uSlot];
      updateUProg();
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
  e.target.value='';
}

function delSlot(e,i) {
  e.stopPropagation();
  photos[i]=null;
  clearUSlot(i);
  updateUProg();
}

function clearUSlot(i) {
  const s=document.getElementById(`us${i}`);
  s.classList.remove('has');
  s.querySelector('.n').style.display='';
  s.querySelector('.l').style.display='';
  s.querySelector('img')?.remove();
}

function updateUProg() {
  const n=photos.filter(p=>p).length;
  document.getElementById('uprog').textContent=`${n} of 3 photos added`;
  const btn=document.getElementById('uDone');
  btn.disabled=n<3; btn.style.opacity=n<3?'0.4':'1';
}

// ---- RESULT ----
function goResult() {
  show('s4');
  for(let i=0;i<3;i++){
    const s=document.getElementById(`sp${i}`);
    s.innerHTML=photos[i]?`<img src="${photos[i]}">`:'<div style="width:100%;height:100%;background:#ddd"></div>';
  }
  // animate printing dots
  let d='';
  const iv=setInterval(()=>{
    d=d.length>=6?'':d+'.';
    document.getElementById('printing').textContent='Printing'+d;
  },380);
  setTimeout(()=>clearInterval(iv),4000);
}

function setColor(col,el) {
  stripColor=col;
  document.getElementById('strip').style.background=col;
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
}

// ---- DOWNLOAD ----
async function download() {
  const c=document.getElementById('xCanvas');
  const pw=600,ph=800,gap=16,pad=40,foot=64;
  c.width=pw+pad*2;
  c.height=pad+ph*3+gap*2+foot+pad;
  const ctx=c.getContext('2d');
  ctx.fillStyle=stripColor;
  ctx.fillRect(0,0,c.width,c.height);
  for(let i=0;i<3;i++){
    if(!photos[i]) continue;
    const img=new Image(); img.src=photos[i];
    await new Promise(r=>{img.onload=r;img.onerror=r;});
    ctx.drawImage(img,pad,pad+i*(ph+gap),pw,ph);
  }
  ctx.fillStyle='#6b5344';
  ctx.font='500 36px Caveat,cursive';
  ctx.textAlign='center';
  ctx.fillText(dateStr,c.width/2,pad+ph*3+gap*2+46);
  const a=document.createElement('a');
  a.download=`photostrip-${Date.now()}.jpg`;
  a.href=c.toDataURL('image/jpeg',0.95);
  a.click();
}

// ---- DOT HELPERS ----
function resetDots() { for(let i=0;i<3;i++) document.getElementById(`d${i}`).className='dot'; }
function dotNow(i) { resetDots(); for(let j=0;j<i;j++) dotDone(j); document.getElementById(`d${i}`).classList.add('now'); }
function dotDone(i) { const d=document.getElementById(`d${i}`); d.classList.remove('now'); d.classList.add('done'); }

// ---- UI HELPERS ----
function showMsg(m){const e=document.getElementById('cmsg');e.textContent=m;e.classList.add('on');}
function hideMsg(){document.getElementById('cmsg').classList.remove('on');}
function doFlash(){const f=document.getElementById('cflash');f.style.opacity='1';setTimeout(()=>f.style.opacity='0',120);}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
